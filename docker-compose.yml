version: '3.8'

services:
  # Web Reporting Dashboard
  report-viewer:
    build: .
    entrypoint: ["python", "report_viewer.py"]
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1

  # Scanner CLI Service (for run-on-demand scans)
  # Run: docker-compose run --rm scanner -t <target> --profile standard
  scanner:
    build: .
    entrypoint: ["python", "cli.py"]
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
