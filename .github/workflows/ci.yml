name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Byte-compile all modules
        run: |
          python -m py_compile \
            cli.py config.py cve_lookup.py dashboard.py database.py \
            exporter.py intel_fusion.py login.py main.py plugins.py \
            report_generator.py scanner.py spectral_surface.py \
            turbo_sweep.py vuln_checker.py

      - name: Import smoke (skip main.py — it boots GUI on import)
        run: python -c "import cli, scanner, intel_fusion, vuln_checker; print('imports ok')"
